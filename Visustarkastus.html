<!DOCTYPE html>
<html lang="fi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Landolt C – näöntarkkuustesti</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #FAFAF9;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-dim: #8A8A86;
      --accent: #2D5BFF;
      --accent-hover: #1A44DD;
      --correct: #22A867;
      --wrong: #E03C3C;
      --border: #E5E5E2;
      --radius: 14px;
      --shadow: 0 1px 3px rgba(0,0,0,0.04), 0 4px 12px rgba(0,0,0,0.03);
    }

    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ─── Shared transitions ─── */
    .screen {
      position: fixed; inset: 0;
      display: grid; place-items: center;
      padding: 24px;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .screen.hidden {
      opacity: 0;
      pointer-events: none;
      transform: scale(0.97);
    }

    /* ─── Calibration ─── */
    .cal-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 44px 48px;
      max-width: 480px;
      width: 100%;
      box-shadow: var(--shadow);
    }
    .cal-card h1 {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }
    .cal-card .subtitle {
      font-size: 13.5px;
      color: var(--text-dim);
      line-height: 1.65;
      margin-bottom: 28px;
    }
    .field { margin-bottom: 20px; }
    .field label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.01em;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 11px 14px;
      font-family: 'DM Mono', monospace;
      font-size: 15px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(45,91,255,0.1);
    }
    .field .hint {
      font-size: 11.5px;
      color: var(--text-dim);
      margin-top: 5px;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 13px 24px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      margin-top: 10px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.985); }
    .cal-error { color: var(--wrong); font-size: 12.5px; margin-top: 10px; min-height: 18px; }

    /* ─── Test screen ─── */
    #testScreen {
      flex-direction: column;
      gap: 0;
      background: #fff;
    }

    .optotype-area {
      flex: 1;
      display: grid;
      place-items: center;
      width: 100%;
      position: relative;
    }

    .optotype-container {
      transition: opacity 0.15s ease, transform 0.15s ease;
    }
    .optotype-container.flash-correct {
      filter: drop-shadow(0 0 24px rgba(34,168,103,0.45));
    }
    .optotype-container.flash-wrong {
      filter: drop-shadow(0 0 24px rgba(224,60,60,0.45));
    }
    .optotype-container.entering {
      opacity: 0;
      transform: scale(0.92);
    }

    /* ─── Controls bar ─── */
    .controls-bar {
      width: 100%;
      padding: 20px 24px 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: var(--bg);
      border-top: 1px solid var(--border);
    }
    .arrow-btn {
      width: 64px;
      height: 64px;
      border-radius: 16px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      display: grid;
      place-items: center;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.04);
    }
    .arrow-btn:hover {
      border-color: var(--accent);
      background: #F0F4FF;
    }
    .arrow-btn:active { transform: scale(0.93); }
    .arrow-btn svg {
      width: 22px;
      height: 22px;
      stroke: var(--text);
      stroke-width: 2.5;
      fill: none;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .cant-see-btn {
      margin-left: 20px;
      padding: 10px 20px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .cant-see-btn:hover {
      background: #FEF0F0;
      border-color: var(--wrong);
      color: var(--wrong);
    }

    /* ─── Top bar ─── */
    .top-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 0 16px;
      z-index: 20;
      pointer-events: none;
    }
    .top-bar button {
      pointer-events: auto;
      font-family: 'DM Mono', monospace;
      font-size: 11.5px;
      font-weight: 500;
      color: var(--text-dim);
      background: rgba(255,255,255,0.75);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 14px;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .top-bar button:hover {
      color: var(--text);
      border-color: var(--accent);
      background: rgba(255,255,255,0.92);
    }

    /* keyboard hint */
    .key-hint {
      position: fixed;
      bottom: 100px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 0.03em;
      opacity: 0.6;
      pointer-events: none;
    }

    /* ─── Result screen ─── */
    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 52px 48px;
      max-width: 420px;
      width: 100%;
      box-shadow: var(--shadow);
      text-align: center;
    }
    .result-card .result-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 12px;
    }
    .result-card .result-value {
      font-family: 'DM Mono', monospace;
      font-size: 64px;
      font-weight: 700;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 8px;
    }
    .result-card .result-desc {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      margin-bottom: 32px;
    }
    .result-card .result-detail {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg);
      border-radius: 10px;
      padding: 14px 18px;
      margin-bottom: 28px;
      text-align: left;
      line-height: 1.8;
    }
    .btn-secondary {
      display: inline-block;
      padding: 12px 32px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      background: var(--surface);
      color: var(--text);
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
    }
    .btn-secondary:hover {
      background: var(--bg);
      border-color: var(--accent);
    }
  </style>
</head>
<body>

  <!-- ═══ Calibration ═══ -->
  <div class="screen" id="calScreen">
    <div class="cal-card">
      <h1>◔ Näöntarkkuustesti</h1>
      <p class="subtitle">Syötä kalibrointiarvo ja tutkimusetäisyys. Testi näyttää Landolt C -optotyyppejä yksi kerrallaan — vastaa nuolinäppäimillä aukon suunnan mukaan.</p>
      <div class="field">
        <label for="pxPerMmInput">px / mm</label>
        <input id="pxPerMmInput" type="number" step="any" min="0.1" placeholder="esim. 3.7795" />
        <div class="hint">Mittakalibroinnin antama arvo</div>
      </div>
      <div class="field">
        <label for="distanceInput">Tutkimusetäisyys (m)</label>
        <input id="distanceInput" type="number" step="any" min="0.1" placeholder="esim. 4" />
        <div class="hint">Tyypillisesti 4 tai 6 metriä</div>
      </div>
      <button class="btn-primary" id="startBtn">Aloita testi</button>
      <div class="cal-error" id="calError"></div>
    </div>
  </div>

  <!-- ═══ Top bar (visible on test & result screens) ═══ -->
  <div class="top-bar hidden" id="topBar">
    <button id="calBtn">Kalibroi</button>
  </div>

  <!-- ═══ Test ═══ -->
  <div class="screen hidden" id="testScreen">
    <div class="optotype-area">
      <div class="optotype-container" id="optotypeContainer"></div>
    </div>
    <div class="controls-bar">
      <button class="arrow-btn" data-dir="left" title="Vasen (←)">
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="arrow-btn" data-dir="up" title="Ylös (↑)">
        <svg viewBox="0 0 24 24"><polyline points="18 15 12 9 6 15"/></svg>
      </button>
      <button class="arrow-btn" data-dir="down" title="Alas (↓)">
        <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
      </button>
      <button class="arrow-btn" data-dir="right" title="Oikea (→)">
        <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button class="cant-see-btn" id="cantSeeBtn" title="Välilyönti">En näe</button>
    </div>
    <div class="key-hint">Käytä nuolinäppäimiä tai välilyöntiä</div>
  </div>

  <!-- ═══ Result ═══ -->
  <div class="screen hidden" id="resultScreen">
    <div class="result-card">
      <div class="result-label">Näöntarkkuus</div>
      <div class="result-value" id="resultValue">—</div>
      <div class="result-desc" id="resultDesc"></div>
      <div class="result-detail" id="resultDetail"></div>
      <button class="btn-secondary" id="retryBtn">Testaa uudelleen</button>
    </div>
  </div>

  <script>
    // ─── Constants ───
    const VISUS_LEVELS = [0.4, 0.5, 0.63, 0.8, 1.0];
    const REQUIRED_CORRECT = 3;
    const MAX_ERRORS = 2;
    const DIRECTIONS = ['right', 'up', 'left', 'down'];
    const ROTATIONS = { right: 0, down: 90, left: 180, up: 270 };
    const TAN_1_ARCMIN = Math.tan(Math.PI / 10800);

    function optotypeDiameterMm(visus, distanceMm) {
      return 5 * TAN_1_ARCMIN * distanceMm / visus;
    }

    // ─── State ───
    let pxPerMm = 0;
    let distanceM = 0;
    let currentLevelIdx = 0;
    let correctCount = 0;
    let errorCount = 0;
    let currentDirection = '';
    let uidCounter = 0;
    let inputLocked = false;
    let levelLog = [];

    // ─── DOM ───
    const calScreen = document.getElementById('calScreen');
    const testScreen = document.getElementById('testScreen');
    const resultScreen = document.getElementById('resultScreen');
    const topBar = document.getElementById('topBar');
    const calBtn = document.getElementById('calBtn');
    const pxPerMmInput = document.getElementById('pxPerMmInput');
    const distanceInput = document.getElementById('distanceInput');
    const startBtn = document.getElementById('startBtn');
    const calError = document.getElementById('calError');
    const optotypeContainer = document.getElementById('optotypeContainer');
    const cantSeeBtn = document.getElementById('cantSeeBtn');
    const resultValue = document.getElementById('resultValue');
    const resultDesc = document.getElementById('resultDesc');
    const resultDetail = document.getElementById('resultDetail');
    const retryBtn = document.getElementById('retryBtn');

    // ─── LocalStorage helpers ───
    const STORAGE_KEY = 'landolt_cal';

    function saveCalibration() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify({ pxPerMm, distanceM }));
      } catch(e) {}
    }

    function loadCalibration() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return false;
        const data = JSON.parse(raw);
        if (data.pxPerMm > 0 && data.distanceM > 0) {
          pxPerMm = data.pxPerMm;
          distanceM = data.distanceM;
          pxPerMmInput.value = pxPerMm;
          distanceInput.value = distanceM;
          return true;
        }
      } catch(e) {}
      return false;
    }

    // ─── Screen switching ───
    function showScreen(screen) {
      [calScreen, testScreen, resultScreen].forEach(s => s.classList.add('hidden'));
      screen.classList.remove('hidden');
      // Show top bar on test & result screens
      if (screen === testScreen || screen === resultScreen) {
        topBar.classList.remove('hidden');
      } else {
        topBar.classList.add('hidden');
      }
    }

    // ─── Landolt C SVG ───
    function createLandoltSVG(direction, sizePx, uid) {
      const rot = ROTATIONS[direction];
      const maskId = `m${uid}`;
      const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
      svg.setAttribute('width', sizePx);
      svg.setAttribute('height', sizePx);
      svg.setAttribute('viewBox', '0 0 50 50');
      svg.innerHTML = `
        <defs>
          <mask id="${maskId}">
            <rect x="0" y="0" width="50" height="50" fill="white"/>
            <circle cx="25" cy="25" r="15" fill="black"/>
            <rect x="25" y="20" width="25" height="10" fill="black"/>
          </mask>
        </defs>
        <g transform="rotate(${rot} 25 25)">
          <circle cx="25" cy="25" r="25" fill="#1A1A1A" mask="url(#${maskId})"/>
        </g>`;
      return svg;
    }

    let lastDirection = '';
    function randomDirection() {
      const pool = DIRECTIONS.filter(d => d !== lastDirection);
      const pick = pool[Math.floor(Math.random() * pool.length)];
      lastDirection = pick;
      return pick;
    }

    // ─── Show one optotype ───
    function showOptotype() {
      const visus = VISUS_LEVELS[currentLevelIdx];
      const distanceMm = distanceM * 1000;
      const diamMm = optotypeDiameterMm(visus, distanceMm);
      const diamPx = diamMm * pxPerMm;

      currentDirection = randomDirection();
      const svg = createLandoltSVG(currentDirection, diamPx, uidCounter++);

      optotypeContainer.innerHTML = '';
      optotypeContainer.classList.add('entering');
      optotypeContainer.appendChild(svg);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          optotypeContainer.classList.remove('entering');
        });
      });
    }

    // ─── Process answer ───
    function processAnswer(answer) {
      if (inputLocked) return;
      inputLocked = true;

      const isCorrect = answer === currentDirection;
      const flashClass = isCorrect ? 'flash-correct' : 'flash-wrong';

      optotypeContainer.classList.add(flashClass);

      if (isCorrect) {
        correctCount++;
      } else {
        errorCount++;
      }

      setTimeout(() => {
        optotypeContainer.classList.remove(flashClass);

        if (correctCount >= REQUIRED_CORRECT) {
          levelLog.push({
            visus: VISUS_LEVELS[currentLevelIdx],
            passed: true,
            correct: correctCount,
            errors: errorCount
          });

          if (currentLevelIdx >= VISUS_LEVELS.length - 1) {
            finishTest(VISUS_LEVELS[currentLevelIdx]);
            return;
          }

          currentLevelIdx++;
          correctCount = 0;
          errorCount = 0;
          showOptotype();
          inputLocked = false;
          return;
        }

        if (errorCount >= MAX_ERRORS) {
          levelLog.push({
            visus: VISUS_LEVELS[currentLevelIdx],
            passed: false,
            correct: correctCount,
            errors: errorCount
          });

          if (currentLevelIdx === 0) {
            finishTest(null);
          } else {
            finishTest(VISUS_LEVELS[currentLevelIdx - 1]);
          }
          return;
        }

        showOptotype();
        inputLocked = false;
      }, 350);
    }

    // ─── Finish ───
    function finishTest(visus) {
      const label = visus === null ? 'Alle 0.4' : visus.toFixed(2).replace(/0$/, '');
      resultValue.textContent = label;

      if (visus === null) {
        resultDesc.textContent = 'Näöntarkkuus jäi alle alimman testatun tason.';
      } else if (visus >= 1.0) {
        resultDesc.textContent = 'Erinomainen näöntarkkuus — kaikki tasot läpäisty.';
      } else {
        resultDesc.textContent = `Näöntarkkuus vastaa visusarvoa ${label}.`;
      }

      let log = '';
      for (const entry of levelLog) {
        const status = entry.passed ? '✓' : '✗';
        log += `${status}  Visus ${entry.visus.toFixed(2).replace(/0$/, '')}`;
        log += `  —  ${entry.correct} oikein, ${entry.errors} virhettä\n`;
      }
      log += `\npx/mm: ${pxPerMm.toFixed(4)}  ·  etäisyys: ${distanceM} m`;
      resultDetail.textContent = log;

      showScreen(resultScreen);
    }

    // ─── Launch test (resets state, uses current pxPerMm & distanceM) ───
    function launchTest() {
      currentLevelIdx = 0;
      correctCount = 0;
      errorCount = 0;
      uidCounter = 0;
      inputLocked = false;
      levelLog = [];
      lastDirection = '';

      showScreen(testScreen);
      showOptotype();
    }

    // ─── Start from calibration form ───
    function startFromCalibration() {
      const px = parseFloat(pxPerMmInput.value);
      const dist = parseFloat(distanceInput.value);
      if (!px || px <= 0) { calError.textContent = 'Syötä kelvollinen px/mm-arvo.'; return; }
      if (!dist || dist <= 0) { calError.textContent = 'Syötä kelvollinen etäisyys.'; return; }
      calError.textContent = '';
      pxPerMm = px;
      distanceM = dist;
      saveCalibration();
      launchTest();
    }

    // ─── Event listeners ───
    startBtn.addEventListener('click', startFromCalibration);
    pxPerMmInput.addEventListener('keydown', e => { if (e.key === 'Enter') startFromCalibration(); });
    distanceInput.addEventListener('keydown', e => { if (e.key === 'Enter') startFromCalibration(); });

    document.querySelectorAll('.arrow-btn').forEach(btn => {
      btn.addEventListener('click', () => processAnswer(btn.dataset.dir));
    });

    cantSeeBtn.addEventListener('click', () => processAnswer('__cant_see__'));

    document.addEventListener('keydown', e => {
      if (testScreen.classList.contains('hidden')) return;

      const map = {
        ArrowLeft: 'left',
        ArrowRight: 'right',
        ArrowUp: 'up',
        ArrowDown: 'down'
      };

      if (map[e.key]) {
        e.preventDefault();
        processAnswer(map[e.key]);
      } else if (e.key === ' ' || e.key === 'Spacebar') {
        e.preventDefault();
        processAnswer('__cant_see__');
      }
    });

    // Retry = start new test directly (calibration already saved)
    retryBtn.addEventListener('click', () => launchTest());

    // Calibrate button = go back to calibration form
    calBtn.addEventListener('click', () => showScreen(calScreen));

    // ─── Init: load saved calibration if available ───
    loadCalibration();
  </script>
</body>
</html>
